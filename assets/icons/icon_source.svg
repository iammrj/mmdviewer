<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mdGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F0FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bgGradient)"/>

  <!-- Markdown "M" symbol with down arrow -->
  <g transform="translate(512, 420)">
    <!-- Left pillar of M -->
    <path d="M -180 -120 L -180 200 L -100 200 L -100 20 L -20 140 L 60 20 L 60 200 L 140 200 L 140 -120 L 40 -120 L -20 20 L -80 -120 Z"
          fill="url(#mdGradient)" stroke="#2E5C8A" stroke-width="8"/>
  </g>

  <!-- Down arrow -->
  <g transform="translate(512, 660)">
    <path d="M 0 -20 L 80 60 L 40 60 L 40 140 L -40 140 L -40 60 L -80 60 Z"
          fill="#FFD43B" stroke="#FAB005" stroke-width="6"/>
  </g>

  <!-- Mermaid flowchart nodes (subtle decorative elements) -->
  <g opacity="0.3">
    <!-- Small flowchart node top right -->
    <rect x="780" y="150" width="120" height="60" rx="8" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M 840 180 L 860 200 L 840 220" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>

    <!-- Small flowchart node bottom left -->
    <circle cx="180" cy="850" r="35" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M 180 850 L 220 870" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
